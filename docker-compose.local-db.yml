services:
  postgres:
    image: postgres:16-alpine
    container_name: lead-score-postgres-local
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lead_score
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lead-score-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lead_score"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  lead-score-postgres-data:
