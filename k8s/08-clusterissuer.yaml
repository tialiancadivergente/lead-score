apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Servidor Let's Encrypt de produção
    server: https://acme-v02.api.letsencrypt.org/directory
    
    # Email para notificações de expiração
    email: contato@aliancadivergente.com.br
    
    # Secret para armazenar a chave privada
    privateKeySecretRef:
      name: letsencrypt-prod
    
    # Solver HTTP-01 usando Ingress NGINX
    solvers:
    - http01:
        ingress:
          class: nginx
