apiVersion: v1
kind: ConfigMap
metadata:
  name: lead-score-config
  namespace: lead-score
data:
  PORT: "3000"
  NODE_ENV: "production"
  API_KEY_ENABLED: "true"
  
  # Database
  DB_HOST: "lead-score-db.postgres.database.azure.com"
  DB_PORT: "5432"
  DB_NAME: "postgres"
  DB_SSL: "true"
  DB_POOL_MAX: "10"
  DB_CONNECTION_TIMEOUT_MS: "5000"
  DB_IDLE_TIMEOUT_MS: "30000"
  DB_QUERY_TIMEOUT_MS: "20000"
  DB_STATEMENT_TIMEOUT_MS: "20000"
  TYPEORM_SYNC: "false"
  TYPEORM_LOGGING: "false"
  
  # Service Bus
  SERVICE_BUS_ENABLED: "true"
  SERVICE_BUS_LEAD_SCORE_QUEUE: "lead-score"
  SERVICE_BUS_CONSUMER_ENABLED: "true"
  SERVICE_BUS_MAX_RETRIES: "5"
  SERVICE_BUS_RETRY_DELAY_MS: "200"
  SERVICE_BUS_MAX_RETRY_DELAY_MS: "5000"
  SERVICE_BUS_LEAD_SCORE_MAX_CONCURRENCY: "2"
  
  # Fila: cadastro de leads
  SERVICE_BUS_LEAD_REGISTRATION_QUEUE: "lead-registration"
  SERVICE_BUS_LEAD_REGISTRATION_CONSUMER_ENABLED: "true"
  SERVICE_BUS_LEAD_REGISTRATION_MAX_CONCURRENCY: "5"

  SERVICE_BUS_LEAD_SCORE_CAPTURE_RETRY_MAX: "12"
  SERVICE_BUS_LEAD_SCORE_CAPTURE_RETRY_DELAY_SECONDS: "30"

  # Fila: extracao de marketing
  SERVICE_BUS_MARKETING_EXTRACT_QUEUE: "marketing-extract"
  SERVICE_BUS_MARKETING_EXTRACT_CONSUMER_ENABLED: "false"
  SERVICE_BUS_MARKETING_EXTRACT_MAX_CONCURRENCY: "3"
  
  # ActiveCampaign
  ACTIVECAMPAIGN_BASE_URL: "https://imperio55.api-us1.com/api/3"
  ACTIVECAMPAIGN_CREATE_CONTACT_PATH: "/api/3/contacts"

  # Google Ads OAuth
  GOOGLE_ADS_LOGIN_CUSTOMER_ID: "8950904507"
  GOOGLE_ADS_OAUTH_REDIRECT_URI: "https://leads-api.aliancadivergente.com.br/oauth/google-ads/callback"
  GOOGLE_ADS_OAUTH_SCOPES: "https://www.googleapis.com/auth/adwords,openid,email,profile"
  GOOGLE_ADS_API_VERSION: "v20"

  # Meta OAuth
  META_OAUTH_REDIRECT_URI: "https://leads-api.aliancadivergente.com.br/oauth/meta/callback"
  META_OAUTH_SCOPES: "ads_read,ads_management,business_management,email"
  META_API_VERSION: "v22.0"

  # Copiloto de Trafego (IA)
  OPENAI_MODEL: "gpt-4o"
  COPILOT_RISK_SCAN_ENABLED: "false"
  COPILOT_RISK_SCAN_INTERVAL_MINUTES: "60"
