apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-score-worker
  namespace: lead-score
  labels:
    app: lead-score
    component: worker
    managed-by: kustomize
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: lead-score
      component: worker
      managed-by: kustomize
  template:
    metadata:
      labels:
        app: lead-score
        component: worker
        managed-by: kustomize
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
      - name: lead-score-worker
        image: leadscoreacr.azurecr.io/lead-score:v1.4.19
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: lead-score-config
        - secretRef:
            name: lead-score-secrets
        env:
        - name: SERVICE_BUS_CONSUMER_ENABLED
          value: "true"
        - name: SERVICE_BUS_LEAD_REGISTRATION_CONSUMER_ENABLED
          value: "false"
        - name: SERVICE_BUS_LEAD_SCORE_CONSUMER_ENABLED
          value: "true"
        - name: SERVICE_BUS_LEAD_SCORE_MAX_CONCURRENCY
          value: "1"
        - name: SERVICE_BUS_MARKETING_EXTRACT_CONSUMER_ENABLED
          value: "false"

        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

      restartPolicy: Always
      dnsPolicy: ClusterFirst
