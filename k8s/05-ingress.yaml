apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lead-score-ingress
  namespace: lead-score
  annotations:
    # Ingress Controller - Nginx (padrão AKS)
    kubernetes.io/ingress.class: nginx
    
    # Habilitar redirect HTTP -> HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # SSL/TLS com cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod
    
    # Configurações de timeout
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    
    # CORS (se necessário)
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # Rate limiting (opcional)
    # nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  # TLS habilitado
  tls:
  - hosts:
    - leads-api.aliancadivergente.com.br
    secretName: lead-score-tls
  rules:
  - host: leads-api.aliancadivergente.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lead-score-service
            port:
              number: 80

---
# Ingress alternativo usando Application Gateway (se configurado no AKS)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lead-score-ingress-appgw
  namespace: lead-score
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30"
spec:
  rules:
  - host: leads-api.aliancadivergente.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: lead-score-service
            port:
              number: 80
